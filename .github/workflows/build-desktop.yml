name: Build Desktop Installers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: minecraft-mod-ui/package-lock.json

      - name: Install dependencies
        working-directory: minecraft-mod-ui
        run: npm install --legacy-peer-deps

      - name: Build React app
        working-directory: minecraft-mod-ui
        run: npx vite build

      - name: Compile Electron files
        working-directory: minecraft-mod-ui
        run: npx tsc --project electron/tsconfig.json

      - name: Verify compiled files exist
        working-directory: minecraft-mod-ui
        shell: pwsh
        run: |
          if (!(Test-Path "main.js")) { throw "main.js not found" }
          if (!(Test-Path "preload.js")) { throw "preload.js not found" }
          if (!(Test-Path "dist/index.html")) { throw "dist/index.html not found" }
          Write-Host "All required files present"

      - name: Build Windows NSIS installer
        working-directory: minecraft-mod-ui
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release files
        working-directory: minecraft-mod-ui
        shell: pwsh
        run: Get-ChildItem -Path release -Recurse | Format-Table Name, Length

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            minecraft-mod-ui/release/*.exe
            minecraft-mod-ui/release/*.exe.blockmap
          retention-days: 30
          if-no-files-found: error

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: minecraft-mod-ui/package-lock.json

      - name: Install dependencies
        working-directory: minecraft-mod-ui
        run: npm install --legacy-peer-deps

      - name: Build React app
        working-directory: minecraft-mod-ui
        run: npx vite build

      - name: Compile Electron files
        working-directory: minecraft-mod-ui
        run: npx tsc --project electron/tsconfig.json

      - name: Build Linux AppImage
        working-directory: minecraft-mod-ui
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux installer
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: minecraft-mod-ui/release/*.AppImage
          retention-days: 30
          if-no-files-found: error

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: minecraft-mod-ui/package-lock.json

      - name: Install dependencies
        working-directory: minecraft-mod-ui
        run: npm install --legacy-peer-deps

      - name: Build React app
        working-directory: minecraft-mod-ui
        run: npx vite build

      - name: Compile Electron files
        working-directory: minecraft-mod-ui
        run: npx tsc --project electron/tsconfig.json

      - name: Build macOS DMG
        working-directory: minecraft-mod-ui
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: minecraft-mod-ui/release/*.dmg
          retention-days: 30
          if-no-files-found: error

  upload-to-release:
    name: Upload to GitHub Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: find artifacts -type f | sort

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-installer/*
            artifacts/linux-installer/*
            artifacts/macos-installer/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
