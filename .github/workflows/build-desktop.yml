name: Build Desktop App (Tauri v2)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            target: 'linux'
          - platform: 'windows-latest'
            target: 'windows'
          - platform: 'macos-latest'
            target: 'macos'

    runs-on: ${{ matrix.platform }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './minecraft-mod-ui/src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend dependencies
        working-directory: ./minecraft-mod-ui
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './minecraft-mod-ui'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-mod-studio-${{ matrix.target }}
          path: |
            minecraft-mod-ui/src-tauri/target/release/bundle/**/*
          if-no-files-found: warn
