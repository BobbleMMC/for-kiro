  <rect x="331" y="436" width="22" height="14" rx="2" fill="#444" stroke="#555" stroke-width="0.5"/>
  <rect x="356" y="436" width="22" height="14" rx="2" fill="#444" stroke="#555" stroke-width="0.5"/>
  <rect x="381" y="436" width="22" height="14" rx="2" fill="#444" stroke="#555" stroke-width="0.5"/>
