  <rect x="398" y="418" width="22" height="14" rx="2" fill="#444" stroke="#555" stroke-width="0.5"/>
  <rect x="423" y="418" width="22" height="14" rx="2" fill="#444" stroke="#555" stroke-width="0.5"/>
  <rect x="448" y="418" width="22" height="14" rx="2" fill="#444" stroke="#555" stroke-width="0.5"/>
