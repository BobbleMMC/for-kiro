  <rect x="293" y="454" width="25" height="14" rx="2" fill="#444" stroke="#555" stroke-width="0.5"/>
  <rect x="321" y="454" width="150" height="14" rx="2" fill="#444" stroke="#555" stroke-width="0.5"/>
  <rect x="474" y="454" width="25" height="14" rx="2" fill="#444" stroke="#555" stroke-width="0.5"/>
  <rect x="502" y="454" width="25" height="14" rx="2" fill="#444" stroke="#555" stroke-width="0.5"/>
  <rect x="530" y="454" width="25" height="14" rx="2" fill="#444" stroke="#555" stroke-width="0.5"/>
  
  <!-- Trackpad -->
  <rect x="340" y="472" width="120" height="5" rx="2" fill="#3a3a3a" stroke="#555" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Laptop front edge -->
  <path d="M150 478 L650 478 L645 485 Q643 488 640 488 L160 488 Q157 488 155 485 Z" fill="#252525" stroke="#444" stroke-width="1"/>
  
  <!-- Power indicator light -->
  <circle cx="400" cy="483" r="2" fill="#4ecca3">
    <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Shadow under laptop -->
  <ellipse cx="400" cy="490" rx="260" ry="8" fill="rgba(0,0,0,0.3)"/>
  
  <!-- Ambient light reflection on desk -->
  <ellipse cx="400" cy="500" rx="150" ry="20" fill="#0f3460" opacity="0.1"/>
  
  <!-- Small details - USB port on side -->
  <rect x="168" y="430" width="3" height="8" rx="1" fill="#555"/>
  <rect x="168" y="445" width="3" height="6" rx="1" fill="#555"/>
  
  <!-- Brand logo on back of screen (subtle) -->
  <circle cx="400" cy="240" r="0" fill="#444" opacity="0"/>
  
  <!-- Screen glow effect -->
  <rect x="220" y="120" width="360" height="245" rx="3" fill="none" stroke="#0f3460" stroke-width="2" opacity="0.3"/>
