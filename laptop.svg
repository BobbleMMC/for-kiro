  <rect x="310" y="400" width="22" height="14" rx="2" fill="#444" stroke="#555" stroke-width="0.5"/>
  <rect x="335" y="400" width="22" height="14" rx="2" fill="#444" stroke="#555" stroke-width="0.5"/>
