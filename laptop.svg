  <rect x="215" y="418" width="30" height="14" rx="2" fill="#444" stroke="#555" stroke-width="0.5"/>
  <rect x="248" y="418" width="22" height="14" rx="2" fill="#444" stroke="#555" stroke-width="0.5"/>
  <rect x="273" y="418" width="22" height="14" rx="2" fill="#444" stroke="#555" stroke-width="0.5"/>
  <rect x="298" y="418" width="22" height="14" rx="2" fill="#444" stroke="#555" stroke-width="0.5"/>
  <rect x="323" y="418" width="22" height="14" rx="2" fill="#444" stroke="#555" stroke-width="0.5"/>
  <rect x="348" y="418" width="22" height="14" rx="2" fill="#444" stroke="#555" stroke-width="0.5"/>
