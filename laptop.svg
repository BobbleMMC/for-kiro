<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e" rx="0"/>
  
  <!-- Desk surface -->
  <rect x="0" y="480" width="800" height="120" fill="#2d2d44"/>
  <rect x="0" y="478" width="800" height="4" fill="#3d3d5c" rx="2"/>
  
  <!-- Laptop Screen - Back casing -->
  <path d="M200 100 L600 100 L610 105 Q612 107 612 110 L612 380 Q612 383 610 385 L190 385 Q188 383 188 380 L188 110 Q188 107 190 105 Z" fill="#2c2c2c"/>
  
  <!-- Screen bezel -->
  <rect x="205" y="108" width="390" height="270" rx="5" fill="#1a1a1a"/>
  
  <!-- Screen display -->
  <rect x="220" y="120" width="360" height="245" rx="3" fill="#0f3460"/>
  
  <!-- Screen content - code/desktop look -->
  <!-- Gradient background on screen -->
  <defs>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16213e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="keyboardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect x="220" y="120" width="360" height="245" rx="3" fill="url(#screenGrad)"/>
  
  <!-- Taskbar -->
  <rect x="220" y="340" width="360" height="25" fill="#0a0a23" opacity="0.8"/>
  
  <!-- Taskbar icons -->
  <circle cx="240" cy="352" r="6" fill="#e94560"/>
  <rect x="255" y="347" width="12" height="10" rx="2" fill="#533483"/>
  <rect x="275" y="347" width="12" height="10" rx="2" fill="#0f3460"/>
  
  <!-- Window on screen -->
  <rect x="240" y="135" width="320" height="195" rx="5" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  
  <!-- Window title bar -->
  <rect x="240" y="135" width="320" height="25" rx="5" fill="#2d2d44"/>
  <rect x="240" y="150" width="320" height="10" fill="#2d2d44"/>
  
  <!-- Window buttons -->
