  <circle cx="270" cy="147" r="5" fill="#ffbd2e"/>
  <circle cx="285" cy="147" r="5" fill="#27c93f"/>
  
  <!-- Code lines on screen -->
  <rect x="255" y="170" width="120" height="8" rx="2" fill="#e94560" opacity="0.8"/>
  <rect x="255" y="185" width="180" height="8" rx="2" fill="#533483" opacity="0.7"/>
  <rect x="270" y="200" width="150" height="8" rx="2" fill="#4ecca3" opacity="0.7"/>
  <rect x="270" y="215" width="200" height="8" rx="2" fill="#eeeeee" opacity="0.5"/>
  <rect x="270" y="230" width="130" height="8" rx="2" fill="#4ecca3" opacity="0.7"/>
  <rect x="270" y="245" width="170" height="8" rx="2" fill="#eeeeee" opacity="0.5"/>
  <rect x="255" y="260" width="90" height="8" rx="2" fill="#e94560" opacity="0.8"/>
  <rect x="255" y="275" width="220" height="8" rx="2" fill="#533483" opacity="0.7"/>
  <rect x="270" y="290" width="160" height="8" rx="2" fill="#4ecca3" opacity="0.7"/>
  <rect x="270" y="305" width="140" height="8" rx="2" fill="#eeeeee" opacity="0.5"/>
  
